<script>
  // Configurazione del sito (era il "Tweaks panel" in dev, qui sono valori fissi)
  window.__BRAMA_CONFIG__ = {
    "density": 400,
    "butterfly": "glass",
    "coreSize": 1.6,
    "coreColor": "#1296de",
    "overlapFade": 0.95,
    "titleFont": "cormorant-roman"
  };
  // Variabili globali lette da vertigine.js
  window.__brama_density   = window.__BRAMA_CONFIG__.density;
  window.__brama_coreSize  = window.__BRAMA_CONFIG__.coreSize;
  window.__brama_coreColor = window.__BRAMA_CONFIG__.coreColor;
  // Applica le scelte di stile prima del rendering, evita flash visivo
  document.documentElement.dataset.titleFont = window.__BRAMA_CONFIG__.titleFont || 'cormorant';
  document.documentElement.style.setProperty('--overlap-fade', String(window.__BRAMA_CONFIG__.overlapFade ?? 0.5));
</script>

<!-- Vertigine canvas init: parte dopo che il canvas è nel DOM -->
<script>
  // Aspetta che #vertigine esista nel DOM, poi carica lo script una sola volta.
  let _vertLoaded = false;
  const _vertObs = new MutationObserver(() => {
    if (!_vertLoaded && document.getElementById('vertigine')) {
      _vertLoaded = true;
      const s = document.createElement('script');
      s.src = 'vertigine.js?v=23';
      document.body.appendChild(s);
      _vertObs.disconnect();
    }
  });
  _vertObs.observe(document.body, { childList: true, subtree: true });
</script>

  const CONFIG = window.__BRAMA_CONFIG__;

  // ── HELPERS ─────────────────────────────────────────────────
  // Mini helper per creare DOM dichiarativamente.
  // h(tag, attrs?, ...children) — children possono essere stringhe o nodi.
  function h(tag, attrs, ...kids) {
    const el = document.createElementNS(
      tag === 'svg' || tag === 'g' || tag === 'path' || tag === 'polygon' ||
      tag === 'circle' || tag === 'line' || tag === 'rect' || tag === 'defs' ||
      tag === 'pattern' || tag === 'linearGradient' || tag === 'radialGradient' ||
      tag === 'stop' || tag === 'clipPath' || tag === 'use' || tag === 'ellipse'
        ? 'http://www.w3.org/2000/svg' : 'http://www.w3.org/1999/xhtml',
      tag
    );
    if (attrs) {
      for (const k in attrs) {
        const v = attrs[k];
        if (v == null || v === false) continue;
        if (k === 'class' || k === 'className') el.setAttribute('class', v);
        else if (k === 'onClick') el.addEventListener('click', v);
        else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
        else el.setAttribute(k, v);
      }
    }
    for (const k of kids.flat()) {
      if (k == null || k === false) continue;
      el.appendChild(typeof k === 'string' || typeof k === 'number'
        ? document.createTextNode(String(k)) : k);
    }
    return el;
  }
  const pad2 = n => String(n).padStart(2, '0');
  const pad3 = n => String(n).padStart(3, '0');

  // ── NAV ─────────────────────────────────────────────────────

        <path d="M -10 -8 Q -55 -35 -85 -22 Q -115 -10 -125 30 Q -132 65 -100 88"

        <polygon points="-150,-50 -158,-55 -155,-43" fill="#0a0a0a" />
        <polygon points="-160,-110 -168,-108 -160,-100" fill="#0a0a0a" />
      </g>

      <g class="wing wing-r" stroke="#0a0a0a" stroke-linejoin="miter" stroke-linecap="round">
        <polygon points="6,-4 100,-160 150,-50" fill="#f4f0e0" stroke-width="1.8" />
        <polygon points="6,-4 100,-160 150,-50" fill="url(#hatchA)" stroke-width="0" />
        <polygon points="100,-160 150,-50 160,-110" fill="#f4f0e0" stroke-width="1.8" />
        <polygon points="100,-160 150,-50 160,-110" fill="url(#hatchB)" stroke-width="0" />
        <polygon points="6,-4 150,-50 90,-12" fill="#f4f0e0" stroke-width="1.8" />
        <polygon points="100,-160 160,-110 120,-130" fill="#0a0a0a" stroke-width="1.6" />
        <polygon points="115,-130 125,-140 122,-122" fill="#f4f0e0" />
        <polygon points="135,-115 145,-122 140,-105" fill="#f4f0e0" />

        <polygon points="4,4 50,30 90,15 75,68" fill="#f4f0e0" stroke-width="1.6" />
        <polygon points="4,4 50,30 90,15 75,68" fill="url(#hatchA)" stroke-width="0" opacity="0.85" />
        <polygon points="75,68 90,15 115,75" fill="#0a0a0a" stroke-width="1.4" />
        <polygon points="95,40 100,52 88,48" fill="#f4f0e0" />
        <polygon points="4,4 75,68 50,90 15,90" fill="#f4f0e0" stroke-width="1.6" />
        <polygon points="4,4 75,68 50,90 15,90" fill="url(#hatchDense)" stroke-width="0" opacity="0.8" />

        <path d="M 10 -8 Q 55 -35 85 -22 Q 115 -10 125 30 Q 132 65 100 88"
              fill="none" stroke="#0a0a0a" stroke-width="11" stroke-linecap="round" />
        <path d="M 10 -8 Q 55 -35 85 -22 Q 115 -10 125 30 Q 132 65 100 88"
              fill="none" stroke="#f4f0e0" stroke-width="9" stroke-linecap="round" stroke-dasharray="9 9" />
        <path d="M 10 -8 Q 55 -35 85 -22 Q 115 -10 125 30 Q 132 65 100 88"
              fill="none" stroke="#0a0a0a" stroke-width="2" />

        <polygon points="150,-50 158,-55 155,-43" fill="#0a0a0a" />

      <path d="M -3 -45 L 3 -45 L 5 78 L 0 92 L -5 78 Z" fill="#0a0a0a" />

  // ── FARFALLA (variante GLASS) ───────────────────────────────
  function ButterflyGlass() {
    const wrap = h('div', { class: 'butterfly butterfly-glass', 'aria-hidden': 'true' });
    wrap.innerHTML = `
      <div class="g-wing g-wing-l">
        <div class="shard s-a"></div>
        <div class="shard s-b"></div>
        <div class="shard s-c"></div>
        <div class="shard s-d"></div>
        <div class="shard s-e"></div>
        <div class="highlight h-1"></div>
        <div class="highlight h-2"></div>
      </div>
      <div class="g-wing g-wing-r">
        <div class="shard s-a"></div>
        <div class="shard s-b"></div>
        <div class="shard s-c"></div>
        <div class="shard s-d"></div>
        <div class="shard s-e"></div>
        <div class="highlight h-1"></div>
        <div class="highlight h-2"></div>
      </div>
      <svg class="g-body" viewBox="-30 -150 60 280" aria-hidden="true">
        <defs>
          <linearGradient id="glassFaceL" x1="0" y1="0" x2="1" y2="0.4">
            <stop offset="0" stop-color="#3b4256" stop-opacity="1" />

            <stop offset="1" stop-color="#020308" stop-opacity="1" />
          </linearGradient>
          <linearGradient id="glassFaceR" x1="1" y1="0" x2="0" y2="0.4">
            <stop offset="0" stop-color="#2c3142" stop-opacity="1" />
            <stop offset="0.45" stop-color="#0a0d18" stop-opacity="1" />
            <stop offset="1" stop-color="#000104" stop-opacity="1" />
          </linearGradient>
          <linearGradient id="glassFaceTop" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop offset="0" stop-color="#5a6177" stop-opacity="1" />
            <stop offset="1" stop-color="#0a0d18" stop-opacity="1" />
          </linearGradient>
          <linearGradient id="bodyGlintGrad" x1="0" y1="0" x2="0" y2="1">

        <polygon points="7,22 0,92 0,22" fill="url(#glassFaceR)" />
        <line x1="0" y1="-50" x2="0" y2="92" stroke="rgba(220,235,248,0.55)" stroke-width="0.6" />
        <polygon points="-1,-44 -4,12 -1,14" fill="rgba(230,240,250,0.18)" />
        <polygon points="0,-50 7,22 0,92 -7,22" fill="none" stroke="#000" stroke-width="0.8" stroke-linejoin="miter" />
        <g clip-path="url(#bodyClip)">
          <rect class="body-glint body-glint-down" x="-12" y="-60" width="24" height="180" fill="url(#bodyGlintGrad)" />
          <rect class="body-glint body-glint-up"   x="-12" y="-60" width="24" height="180" fill="url(#bodyGlintGrad)" />
        </g>
        <circle cx="0" cy="-50" r="7" fill="#020617" />

    return wrap;
  }

  function BramaButterfly(variant) {
    const inner = variant === 'glass' ? ButterflyGlass() : ButterflyInk();
    return h('div', { class: 'hero-mark' },
      h('div', { class: 'butterfly-wrap' },
        h('div', { class: 'butterfly-bloom' }),
        inner
      )
    );
  }

  // ── HERO ────────────────────────────────────────────────────
  function Hero() {
    const hint = h('a', {
      class: 'hint-pointer',
      href: '#opere',
      'aria-label': 'Vai alle opere'
    });
    hint.innerHTML = `
      <span class="hint-label">opere</span>
      <svg viewBox="0 0 24 36" aria-hidden="true">
        <path d="M 12 2 L 12 28 M 4 20 L 12 30 L 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    `;
    return h('section', { class: 'hero', 'data-screen-label': 'Hero — Vertigine' },
      h('canvas', { id: 'vertigine' }),
      BramaButterfly(CONFIG.butterfly),
      hint
    );
  }

  // ── MASONRY (griglia opere) ─────────────────────────────────
  function Masonry(onOpen) {
    const grid = h('div', { class: 'masonry' });
    WORKS.forEach((w, i) => {
      const tile = h('div', {
        class: 'tile',
        onClick: () => onOpen(i)
      });
      // Le prime 4 thumbnails partono subito (eager + alta priorità) così
      // sono già pronte quando l'utente arriva in galleria; le altre lazy.
      const eager = i < 4;
      tile.innerHTML = `
        <div class="frame">
          <img src="${BASE + w.file}" alt="${w.title}"
               loading="${eager ? 'eager' : 'lazy'}"
               decoding="async"
               fetchpriority="${eager ? 'high' : 'low'}" />
          <div class="corner">${pad2(i + 1)} / ${WORKS.length}</div>
        </div>
        <div class="meta">
          <span class="t">${w.title}</span>
          <span class="y">${w.year}</span>
        </div>
      `;
      grid.appendChild(tile);
    });
    return grid;
  }

  // ── LIGHTBOX ────────────────────────────────────────────────
  function Lightbox() {
    let idx = null;

    const closeBtn = h('button', { class: 'close', 'aria-label': 'Chiudi' });
    const fsBtn = h('button', { class: 'fs-btn', 'aria-label': 'Schermo intero' });
    fsBtn.innerHTML =
      '<svg viewBox="0 0 24 24" aria-hidden="true">' +
        '<path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>' +
      '</svg>';
    const stageImg = h('img', { src: '', alt: '' });
    const stage = h('div', { class: 'stage' }, stageImg);

    const eyebrow = h('div', { class: 'eyebrow' });
    const title   = h('h2',  { class: 'title' });
    const yearV   = h('div', { class: 'v' });
    const sizeV   = h('div', { class: 'v' });
    const matsV   = h('div', { class: 'v' });
    const counter = h('span', { class: 'counter' });

    const prevBtn = h('button', { class: 'prev' }, '← Prec');
    const nextBtn = h('button', { class: 'next' }, 'Succ →');

    const info = h('aside', { class: 'info' },
      eyebrow,
      title,
      h('div', { class: 'specs' },
        h('div', { class: 'row' }, h('div', { class: 'k' }, 'Anno'), yearV),
        h('div', { class: 'row' }, h('div', { class: 'k' }, 'Formato'), sizeV),
        h('div', { class: 'row' }, h('div', { class: 'k' }, 'Tecnica'), matsV)
      ),
      h('div', { class: 'nav-btns' }, prevBtn, counter, nextBtn)
    );

    const root = h('div', { class: 'lightbox' }, closeBtn, fsBtn, stage, info);

    function paint() {
      if (idx == null) return;
      const w = WORKS[idx];
      stageImg.src = BASE + w.file;
      stageImg.alt = w.title;
      eyebrow.textContent = `No. ${pad3(idx + 1)}`;
      title.textContent = w.title;
      yearV.textContent = w.year;
      sizeV.textContent = w.size + ' cm';
      matsV.textContent = w.materials;
      counter.innerHTML = `<b>${pad2(idx + 1)}</b> / ${WORKS.length}`;
    }

    function open(i) {
      idx = i;
      paint();
      root.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      idx = null;
      root.classList.remove('open');
      root.classList.remove('fullscreen');
      resetZoom();
      document.body.style.overflow = '';
    }
    function toggleFullscreen() {
      root.classList.toggle('fullscreen');
      resetZoom();
    }
    function prev() {
      if (idx == null) return;
      idx = (idx - 1 + WORKS.length) % WORKS.length;
      paint();
      resetZoom();
    }
    function next() {
      if (idx == null) return;
      idx = (idx + 1) % WORKS.length;
      paint();
      resetZoom();
    }

    // ── ZOOM + PAN (attivo in fullscreen) ────────────────────────
    let scale = 1, tx = 0, ty = 0;
    const MIN_SCALE = 1, MAX_SCALE = 5;

    function applyTransform(animate) {
      stageImg.style.transition = animate ? 'transform 0.22s cubic-bezier(.2,.8,.2,1)' : 'none';
      stageImg.style.transform  = `translate3d(${tx}px, ${ty}px, 0) scale(${scale})`;
      if (scale > 1.001) stageImg.classList.add('zoomed');
      else stageImg.classList.remove('zoomed');
    }
    function resetZoom() {
      const wasZoomed = scale > 1.001;
      scale = 1; tx = 0; ty = 0;
      applyTransform(wasZoomed);
    }
    function clampPan() {
      const w = stageImg.offsetWidth  * scale;
      const h = stageImg.offsetHeight * scale;
      const cw = stage.clientWidth;
      const ch = stage.clientHeight;
      const maxX = Math.max(0, (w - cw) / 2);
      const maxY = Math.max(0, (h - ch) / 2);
      tx = Math.max(-maxX, Math.min(maxX, tx));
      ty = Math.max(-maxY, Math.min(maxY, ty));
    }
    // Zoom centrato sul punto (px,py) in coord. di schermo
    function zoomAt(newScale, px, py, animate) {
      newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
      if (Math.abs(newScale - scale) < 0.001) return;
      const r = stage.getBoundingClientRect();
      const dx = px - r.left - r.width  / 2;
      const dy = py - r.top  - r.height / 2;
      const ratio = newScale / scale;
      tx = dx - (dx - tx) * ratio;
      ty = dy - (dy - ty) * ratio;
      scale = newScale;
      clampPan();
      applyTransform(animate);
    }

    // Pinch / pan (touch)
    let pinchD = 0, pinchM = null;
    let panX = 0, panY = 0, panActive = false;

    stage.addEventListener('touchstart', (e) => {
      if (!root.classList.contains('fullscreen')) return;
      if (e.touches.length === 2) {
        const a = e.touches[0], b = e.touches[1];
        pinchD = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
        pinchM = { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 };
      } else if (e.touches.length === 1 && scale > 1.001) {
        panActive = true;
        panX = e.touches[0].clientX;
        panY = e.touches[0].clientY;
      }
    }, { passive: false });

    stage.addEventListener('touchmove', (e) => {
      if (!root.classList.contains('fullscreen')) return;
      if (e.touches.length === 2 && pinchD > 0 && pinchM) {
        e.preventDefault();
        const a = e.touches[0], b = e.touches[1];
        const d = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
        const m = { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 };
        const sRatio  = d / pinchD;
        const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * sRatio));
        // Zoom verso il midpoint corrente
        const r = stage.getBoundingClientRect();
        const dx = m.x - r.left - r.width  / 2;
        const dy = m.y - r.top  - r.height / 2;
        const ratio = newScale / scale;
        tx = dx - (dx - tx) * ratio;
        ty = dy - (dy - ty) * ratio;
        scale = newScale;
        // Pan dovuto allo spostamento del midpoint tra le due dita
        tx += m.x - pinchM.x;
        ty += m.y - pinchM.y;
        clampPan();
        applyTransform(false);
        pinchD = d;
        pinchM = m;
      } else if (panActive && e.touches.length === 1 && scale > 1.001) {
        e.preventDefault();
        const t = e.touches[0];
        tx += t.clientX - panX;
        ty += t.clientY - panY;
        panX = t.clientX;
        panY = t.clientY;
        clampPan();
        applyTransform(false);
      }
    }, { passive: false });

    stage.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) { pinchD = 0; pinchM = null; }
      if (e.touches.length === 0) panActive = false;
    }, { passive: true });

    // Doppio tap → toggle 1x ↔ 2x verso il tap
    let lastTap = 0;
    stage.addEventListener('touchend', (e) => {
      if (!root.classList.contains('fullscreen')) return;
      if (e.changedTouches.length !== 1) return;
      const now = performance.now();
      if (now - lastTap < 300) {
        const t = e.changedTouches[0];
        if (scale > 1.001) zoomAt(1, t.clientX, t.clientY, true);
        else                zoomAt(2, t.clientX, t.clientY, true);
      }
      lastTap = now;
    }, { passive: true });

    // Wheel su desktop → zoom verso il cursore
    stage.addEventListener('wheel', (e) => {
      if (!root.classList.contains('fullscreen')) return;
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      zoomAt(scale * factor, e.clientX, e.clientY, false);
    }, { passive: false });

    // Mouse drag (desktop) quando zoomato
    let mouseDragging = false, mouseStartX = 0, mouseStartY = 0;
    stage.addEventListener('mousedown', (e) => {
      if (!root.classList.contains('fullscreen')) return;
      if (scale <= 1.001) return;
      mouseDragging = true;
      mouseStartX = e.clientX;
      mouseStartY = e.clientY;
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!mouseDragging) return;
      tx += e.clientX - mouseStartX;
      ty += e.clientY - mouseStartY;
      mouseStartX = e.clientX;
      mouseStartY = e.clientY;
      clampPan();
      applyTransform(false);
    });
    window.addEventListener('mouseup', () => { mouseDragging = false; });

    // Doppio click desktop → toggle
    stage.addEventListener('dblclick', (e) => {
      if (!root.classList.contains('fullscreen')) return;
      if (scale > 1.001) zoomAt(1, e.clientX, e.clientY, true);
      else                zoomAt(2, e.clientX, e.clientY, true);
    });

    closeBtn.addEventListener('click', close);
    fsBtn.addEventListener('click', toggleFullscreen);
    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    root.addEventListener('click', e => {
      // In fullscreen niente click-to-close: l'unica via d'uscita è il pulsante,
      // così l'utente può zoomare/pannare l'immagine senza chiudere senza volerlo.
      if (root.classList.contains('fullscreen')) return;
      if (e.target.classList.contains('lightbox') || e.target.classList.contains('stage')) close();
    });
    window.addEventListener('keydown', e => {
      if (!root.classList.contains('open')) return;
      if (e.key === 'Escape') {
        if (root.classList.contains('fullscreen')) toggleFullscreen();
        else close();
      }
      if (e.key === 'ArrowLeft')   prev();
      if (e.key === 'ArrowRight')  next();
      if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    });

    return { root, open };
  }

  // ── GALLERY (sezione opere) ─────────────────────────────────
  // Il lightbox è montato a parte sul body, fuori da #pages, perché
  // un genitore con transform crea un nuovo containing block anche
  // per gli elementi position:fixed (e farebbe traslare anche il
  // lightbox col cambio di pagina).
  function Gallery(onOpen) {
    const head = h('div', { class: 'section-head' },
      h('div', { class: 'eyebrow' }, '2024 — 2025'),
      h('div', { class: 'count' }, h('b', null, String(WORKS.length)), ' · VIII')
    );
    return h('section', {
      id: 'opere',
      class: 'gallery-section',
      'data-screen-label': 'Galleria opere'
    },
      head,
      Masonry(onOpen)
    );
  }

  // ── FOOTER ──────────────────────────────────────────────────
  function Footer() {
    return h('footer', { class: 'footer' },
      h('div', { class: 'sig' },
        h('img', { src: SIG, alt: 'brama' })
      ),
      h('div', { class: 'center' }, '© 2026 — Tutte le opere sono originali'),
      h('a', {
        class: 'ig',
        href: 'https://www.instagram.com/riccardo_bramani',
        target: '_blank',
        rel: 'noreferrer'
      }, '@riccardo_bramani')
    );
  }

  // ── MOUNT ───────────────────────────────────────────────────
  // Layout "due pagine": #pages contiene hero (alto 100vh) e
  // #gallery-page (anch'esso 100vh ma con overflow interno per la
  // galleria che può essere più lunga). Una classe .gallery su #pages
  // applica transform: translateY(-100vh) per scorrere alla pagina 2.
  const app = document.getElementById('app');
  app.appendChild(Nav());

  const lb = Lightbox();
  const galleryPage = h('div', { id: 'gallery-page' },
    Gallery(i => lb.open(i)),
    Footer()
  );
  const pages = h('div', { id: 'pages' },
    Hero(),
    galleryPage
  );
  app.appendChild(pages);
  // Lightbox montato fuori da #pages (vedi commento in Gallery).
  document.body.appendChild(lb.root);
})();
</script>

<!-- Page state machine: hero ↔ galleria, nessun drag parziale -->
<script>
(function () {
  // Modello: due "pagine" discrete impilate verticalmente.
  //   - hero (fissa, 100vh) — sola posizione possibile in stato 'hero'
  //   - galleria (interna scrollabile) — quando in stato 'gallery',
  //     l'utente scorre liberamente dentro #gallery-page; in cima
  //     uno swipe up porta indietro all'hero.
  // Niente più snap a metà strada: la transizione è atomica via
  // CSS transform, quindi è anche fluida (GPU-composited).

  const pages = document.getElementById('pages');
  const galleryPage = document.getElementById('gallery-page');
  const SWIPE_PX = 30; // soglia di swipe per scattare la transizione
  let state = 'hero';
  let busy  = false;
  const TR_MS = 420; // durata della transizione CSS

  function pauseCanvas()  { if (window.__brama_canvas_pause)  window.__brama_canvas_pause(); }
  function resumeCanvas() { if (window.__brama_canvas_resume) window.__brama_canvas_resume(); }

  function goGallery() {
    if (state !== 'hero' || busy) return;
    busy = true;
    pauseCanvas(); // libera GPU durante la transizione
    pages.classList.add('gallery');
    state = 'gallery';
    setTimeout(() => { busy = false; }, TR_MS);
  }

  function goHero() {
    if (state !== 'gallery' || busy) return;
    busy = true;
    pages.classList.remove('gallery');
    state = 'hero';
    // riportiamo lo scroll interno della galleria in cima così, se
    // l'utente torna avanti, la trova dall'inizio.
    galleryPage.scrollTop = 0;
    setTimeout(() => {
      busy = false;
      resumeCanvas(); // hero di nuovo visibile → riavvia il vortice
    }, TR_MS);
  }

  // --- WHEEL (desktop) ---
  // Sull'hero blocchiamo lo scroll naturale (body è già overflow:hidden,
  // ma alcuni browser propagano comunque) e usiamo il delta come "intent".
  let wheelAccum = 0;
  let wheelResetTimer = null;
  window.addEventListener('wheel', (e) => {
    if (busy) { e.preventDefault(); return; }
    if (state === 'hero') {
      e.preventDefault();
      wheelAccum += e.deltaY;
      clearTimeout(wheelResetTimer);
      wheelResetTimer = setTimeout(() => { wheelAccum = 0; }, 140);
      if (wheelAccum > 30) { wheelAccum = 0; goGallery(); }
    } else {
      // gallery: in cima allo scroll interno + rotella in su = back
      if (galleryPage.scrollTop <= 0 && e.deltaY < -8) {
        e.preventDefault();
        goHero();
      }
    }
  }, { passive: false });

  // --- TOUCH ---
  let tStartY = 0;
  let tStartScroll = 0;
  window.addEventListener('touchstart', (e) => {
    tStartY = e.touches[0].clientY;
    tStartScroll = galleryPage.scrollTop;
  }, { passive: true });

  // In stato hero blocchiamo proprio il movimento del dito sulla pagina:
  // così non si vede mai un drag parziale, solo lo snap atomico al rilascio.
  window.addEventListener('touchmove', (e) => {
    if (state === 'hero') e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchend', (e) => {
    if (busy) return;
    const dy = tStartY - e.changedTouches[0].clientY;
    if (state === 'hero') {
      if (dy > SWIPE_PX) goGallery();
    } else {
      // gallery: torna all'hero solo se l'utente era in cima e ha
      // fatto uno swipe verso il basso (dy negativo).
      if (tStartScroll <= 0 && galleryPage.scrollTop <= 0 && dy < -SWIPE_PX) goHero();
    }
  }, { passive: true });

  // --- KEYBOARD ---
  window.addEventListener('keydown', (e) => {
    if (busy) return;
    const down = e.key === 'PageDown' || e.key === 'ArrowDown' || e.key === ' ';
    const up   = e.key === 'PageUp'   || e.key === 'ArrowUp';
    if (state === 'hero' && down) { e.preventDefault(); goGallery(); }
    else if (state === 'gallery' && up && galleryPage.scrollTop <= 0) {
      e.preventDefault(); goHero();
    }
  });

  // Click sulla hint-pointer ("opere") nell'hero: invece dell'anchor #opere
  // (che non funziona perché body è overflow:hidden), lancia la transizione.
  document.addEventListener('click', (e) => {
    const hint = e.target.closest('.hint-pointer');
    if (hint) { e.preventDefault(); goGallery(); }
  });
})();
</script>
